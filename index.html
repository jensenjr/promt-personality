  --shadow:rgba(58,42,26,.06);
  --code-bg:#1E1208;
  --code-txt:#E8C99A;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--bg);
  color:var(--txt);
  font-family:'Figtree',system-ui,-apple-system,sans-serif;
  padding:0 16px;
  transition:background .2s,color .2s;
}

/* ── Theme toggle ── */
.theme-btn{
  position:fixed;top:12px;right:12px;z-index:200;
  background:var(--card);border:1.5px solid var(--bord);
  border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;transition:border-color .14s,background .14s;
  box-shadow:0 1px 6px var(--shadow);
}
.theme-btn:hover{border-color:var(--acc);background:var(--pill)}

/* ── Progress ── */
.progress-track{position:fixed;top:0;left:0;right:0;height:3px;background:var(--bord);z-index:99}
.progress-fill{height:100%;background:linear-gradient(90deg,#F59F00,#E8590C);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── Layout ── */
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:up .28s ease forwards}
.wrap{max-width:600px;margin:0 auto;padding-bottom:100px}

/* ── Buttons: single-choice ── */
.opt{
  cursor:pointer;border-radius:10px;border:1.5px solid var(--bord);
  background:var(--pill);color:var(--txt);padding:11px 16px;
  font-size:14.5px;font-family:inherit;font-weight:500;
  transition:border-color .12s,background .12s,transform .08s;
  text-align:left;line-height:1.45;width:100%;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.opt:hover{border-color:rgba(232,89,12,.5);background:#FFF4E6}
[data-theme="dark"] .opt:hover{background:#251A0A}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .opt:hover{background:#251A0A}}
.opt.on{border-color:var(--acc);background:var(--adim)}
/* Check indicator lives at the end and is always rendered, so selecting never reflows the label */
.opt::after{
  content:"✓";flex-shrink:0;
  width:21px;height:21px;border-radius:50%;
  border:1.5px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;line-height:1;
  color:transparent;background:transparent;
  transition:border-color .14s,background-color .14s,color .14s;
}
.opt.on::after{border-color:var(--acc);background:var(--acc);color:#fff}

/* ── Buttons: multi-select tags ── */
.tag{
  cursor:pointer;border-radius:8px;border:1.5px solid var(--bord);
  background:var(--pill);color:var(--txt);padding:8px 14px;
  font-size:13.5px;font-family:inherit;font-weight:500;
  transition:border-color .12s,background .12s,color .12s;
  line-height:1.3;display:inline-block;margin:0 8px 8px 0;
}
.tag:hover{border-color:rgba(232,89,12,.5)}
/* Selected = filled box (pure colour change), no checkmark, so nothing shifts */
.tag.on{border-color:var(--acc);background:var(--acc);color:#fff}

/* ── Text inputs ── */
textarea,.other-input,.edit-ta{
  width:100%;background:var(--pill);border:1.5px solid var(--bord);
  border-radius:10px;color:var(--txt);font-family:inherit;
  outline:none;transition:border-color .14s;
}
textarea{font-size:15px;padding:14px 16px;resize:vertical;min-height:82px;line-height:1.6}
.other-input{font-size:14px;padding:11px 14px;margin-top:12px}
.edit-ta{font-size:14px;padding:12px 14px;resize:vertical;min-height:70px;line-height:1.55}
textarea:focus,.other-input:focus,.edit-ta:focus{border-color:var(--acc)}
textarea::placeholder,.other-input::placeholder,.edit-ta::placeholder{color:var(--muted)}

/* ── Nav buttons ── */
.next{
  background:var(--acc);color:#fff;font-weight:700;border:none;
  border-radius:10px;padding:12px 22px;font-size:15px;cursor:pointer;
  font-family:inherit;transition:opacity .14s,transform .1s;flex:1;
}
.next:hover{opacity:.88;transform:translateY(-1px)}
.next:active{transform:translateY(0)}
.next:disabled{opacity:.32;cursor:not-allowed;transform:none!important}
.back{
  background:transparent;color:var(--muted);border:1.5px solid var(--bord);
  border-radius:10px;padding:12px 16px;font-size:15px;cursor:pointer;
  font-family:inherit;transition:all .14s;
}
.back:hover{color:var(--txt);border-color:#D9A96E}
.skip{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:13px;margin-top:14px;text-decoration:underline;
  padding:0;font-family:inherit;display:block;
}
.navrow{display:flex;gap:10px;margin-top:28px}

/* ── Prompt output ── */
.pbox{
  background:var(--code-bg);border:1.5px solid var(--bord);
  border-radius:12px;padding:20px;
  font-family:'Menlo','Monaco',monospace;font-size:12px;
  color:var(--code-txt);white-space:pre-wrap;
  max-height:360px;overflow-y:auto;line-height:1.85;word-break:break-word;
}
.cpbtn{
  background:var(--acc);border:1.5px solid var(--acc);color:#fff;
  border-radius:9px;padding:11px 22px;font-weight:700;font-size:14px;
  cursor:pointer;font-family:inherit;transition:all .14s;
}
.cpbtn:hover{opacity:.88}
.cpbtn.ok{background:var(--acc2);border-color:var(--acc2)}

/* ── Misc components ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bord);border-radius:3px}
.badge{
  display:inline-block;background:var(--adim);border:1px solid var(--abord);
  border-radius:20px;padding:5px 13px;font-size:11px;color:var(--acc);
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px;
}
h1{font-size:clamp(30px,7vw,46px);font-weight:800;line-height:1.1;margin:0 0 16px;letter-spacing:-.025em}
.stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--card);border:1px solid var(--bord);
  border-radius:12px;padding:20px 0;margin-bottom:36px;text-align:center;
}
.stat{padding:0 16px}
.stat-val{font-size:22px;font-weight:700}
.stat-label{font-size:12px;color:var(--muted);margin-top:3px}
.cat-pill{

  letter-spacing:.07em;text-transform:uppercase;border:1px solid;
}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.counter{color:var(--muted);font-size:13px}
.qtitle{font-size:clamp(20px,4vw,26px);font-weight:800;line-height:1.25;margin-bottom:4px;letter-spacing:-.02em}
.qsub{color:var(--muted);font-size:13px;margin-bottom:24px;min-height:18px}
.qlabel{font-size:13.5px;font-weight:700;color:var(--muted);margin:22px 0 10px;text-transform:uppercase;letter-spacing:.05em}
.qlabel:first-of-type{margin-top:0}
.hint{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.5}
.info-box{
  background:var(--card);border:1px solid var(--bord);
  border-radius:10px;padding:14px 18px;margin-bottom:20px;
  font-size:13px;color:var(--muted);line-height:1.65;
}
.info-box strong{color:var(--txt)}
.share-box{

}
.share-box strong{color:var(--txt)}
.privacy-note{
  margin-top:20px;background:var(--adim);border:1px solid var(--abord);
  border-radius:10px;padding:13px 16px;font-size:12.5px;color:var(--muted);line-height:1.6;

.privacy-note strong{color:var(--acc)}
/* ── Edit section ── */
.edit-section{margin-top:28px}
.edit-toggle{
  background:var(--card);border:1.5px solid var(--bord);border-radius:10px;
  padding:13px 18px;font-size:14px;font-weight:600;color:var(--txt);
  cursor:pointer;font-family:inherit;width:100%;text-align:left;
  display:flex;justify-content:space-between;align-items:center;

.edit-toggle:hover{border-color:var(--acc)}
.edit-toggle .arrow{transition:transform .2s;color:var(--muted)}
.edit-toggle.open .arrow{transform:rotate(180deg)}
.edit-rows{display:none;padding-top:4px}

.edit-row-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}

(function(){
  const saved = localStorage.getItem("theme");
  if (saved) document.documentElement.dataset.theme = saved;
  updateThemeBtn(saved);
})();

function updateThemeBtn(t) {
  const btn = document.getElementById("theme-btn");
  if (!btn) return;
  const isDark = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme:dark)").matches);
  btn.textContent = isDark ? "☀️" : "🌙";
  btn.title = isDark ? "Byt till ljust läge" : "Byt till mörkt läge";
}

function cycleTheme(){
  const cur = document.documentElement.dataset.theme;
  const sysDark = window.matchMedia("(prefers-color-scheme:dark)").matches;
  let next;
  if (!cur) next = sysDark ? "light" : "dark";
  else if (cur === "dark") next = "light";
  else next = "dark";
  document.documentElement.dataset.theme = next;
  localStorage.setItem("theme", next);
  updateThemeBtn(next);
}

// ── Prompt generation ──────────────────────────────────────
function generatePrompt(a) {
  const out = [];
  out.push("Använd denna profil för att personalisera varje svar i vår konversation. Tillämpa den naturligt — inget behov av att nämna eller referera till denna uppsättning.\n");

  function multiVals(id){
    const base = (a[id] || []).slice();
    const other = (a[id + "_other"] || "").trim();
    if (other) other.split(",").map(s=>s.trim()).filter(Boolean).forEach(v=>{if(!base.includes(v))base.push(v);});
    return base;
  }

  if (a.name_role || a.workplace || a.industry || a.expertise) {
    out.push("## Vem jag är");
    if (a.name_role) out.push(a.name_role + ".");
    if (a.workplace) out.push("Arbetsplats: " + a.workplace);
    if (a.industry) {
      const ind = a.industry === "Annat" && a.industry_annat ? "Annat: " + a.industry_annat : a.industry;
      out.push("Område: " + ind);
    }
    if (a.expertise) out.push("Expertis: " + a.expertise);
    out.push("");
  }

  const useCases = multiVals("use_cases");
  if (useCases.length) {
    out.push("## Hur jag använder AI");
    out.push("Jag använder främst AI till: " + useCases.join(", ") + ".");
    out.push("");
  }

  const comm = [
    a.response_length && "Svarslängd: " + a.response_length,
    a.tone && "Ton: " + a.tone,
    a.format && "Format: " + a.format,
    a.technicality && "Teknisk djup: " + a.technicality,
    a.pushback && "Feedbackstil: " + a.pushback,
  ].filter(Boolean);
  if (comm.length) {
    out.push("## Kommunikationsstil");
    comm.forEach(c => out.push("- " + c));
    out.push("");
  }

  if (a.learning_style) {
    out.push("## Hur jag lär mig bäst");
    out.push(a.learning_style);
    out.push("");
  }

  const topics = multiVals("topics");
  if (topics.length) {
    out.push("## Ämnen jag bryr mig om");
    out.push(topics.join(", "));
    out.push("");
  }

  if (a.goals) {
    out.push("## Mina nuvarande mål");
    out.push(a.goals);
    out.push("");
  }

  if (a.background) {
    out.push("## Kontext om mig");
    out.push(a.background);
    out.push("");
  }

  const frustrations = multiVals("frustrations");
  if (frustrations.length) {
    out.push("## Undvik gärna");
    frustrations.forEach(f => out.push("- " + f));
    out.push("");
  }

  if (a.example) {
    out.push("## Exempel på min stil (matcha tonen och längden här)");
    out.push(a.example);
    out.push("");
  }

  if (a.wish) {
    out.push("## Stående instruktion");
    out.push(a.wish);
  }

  return out.join("\n").trim();
}

// ── State ──────────────────────────────────────────────────
let step = -1;
let ans = {};
let copied = false;
let editOpen = false;
let aiOpen = null;

const app = document.getElementById("app");
const progressTrack = document.getElementById("progress-track");
const progressFill = document.getElementById("progress-fill");

function esc(s){const d=document.createElement("div");d.innerText=s;return d.innerHTML;}
function escAttr(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

// ── Navigation ──────────────────────────────────────────────
function next(){ step = Math.min(N, step + 1); render(); }
function back(){ step = Math.max(-1, step - 1); render(); }
function goToStep(s){ step = s; render(); }

// ── canNext ─────────────────────────────────────────────────
function canNext(page){
  if (!page) return true;
  for (const q of page.qs) {
    if (q.optional) continue;
    const a = ans[q.id];
    if (q.type === "text") { if (!a || !a.trim()) return false; }
    else if (q.type === "single") { if (!a) return false; }
    else if (q.type === "multi") {
      const hasSel = !!(a && a.length > 0);
      const hasOther = !!((ans[q.id+"_other"]||"").trim());
      if (!hasSel && !hasOther) return false;
    }
  }
  return true;
}

// ── No-flicker interactions ─────────────────────────────────
function pickSingle(el, qId, val){
  ans[qId] = val;
  const group = el.closest("[data-qid]");
  group.querySelectorAll(".opt").forEach(b => b.classList.remove("on"));
  el.classList.add("on");
  // Show/hide "Annat" text field for industry
  if (qId === "industry") {
    const w = document.getElementById("annat-wrap");
    if (w) w.className = "annat-wrap" + (val === "Annat" ? " show" : "");
  }
  _updateNextBtn();
}

function toggleMulti(el, qId, val, max){
  const cur = ans[qId] || [];
  if (cur.includes(val)) {
    ans[qId] = cur.filter(v => v !== val);
    el.classList.remove("on");
  } else {
    if (max && cur.length >= max) return;
    ans[qId] = [...cur, val];
    el.classList.add("on");
  }
  const note = document.getElementById("max-note-" + qId);
  if (note && max) note.textContent = (ans[qId]||[]).length + " / " + max + " valda";
  _updateNextBtn();
}

function _updateNextBtn(){
  const btn = document.getElementById("next-btn");
  if (btn) btn.disabled = !canNext(PAGES[step]);
}

function handleOtherInput(el, qId){
  ans[qId + "_other"] = el.value;
  _updateNextBtn();
}

function handleAnnatInput(el){
  ans["industry_annat"] = el.value;
}

function handleTxtInput(el, qId){
  ans[qId] = el.value;
  _updateNextBtn();
}

function handleNext(){
  const page = PAGES[step];
  if (!canNext(page)) return;
  next();
}

// ── Copy prompt ─────────────────────────────────────────────
async function copyPrompt(){
  const text = generatePrompt(ans);
  try {
    await navigator.clipboard.writeText(text);
    copied = true;
  } catch(e){
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); copied = true; } catch(e2){ copied = false; }
    document.body.removeChild(ta);
  }
  const btn = document.getElementById("cp-btn");
  if (btn){ btn.classList.add("ok"); btn.textContent = "✓ Kopierad!"; }
  setTimeout(()=>{
    copied = false;
    const b = document.getElementById("cp-btn");
    if (b){ b.classList.remove("ok"); b.textContent = "Kopiera prompt"; }
  }, 2200);
}

function startOver(){ step=-1; ans={}; editOpen=false; render(); }

function toggleEdit(){
  editOpen = !editOpen;
  const rows = document.getElementById("edit-rows");
  const btn  = document.getElementById("edit-toggle");
  if (!rows || !btn) return;
  rows.className = "edit-rows" + (editOpen?" open":"");
  btn.className  = "edit-toggle" + (editOpen?" open":"");
}

function toggleAI(name){
  aiOpen = aiOpen === name ? null : name;
  ["chatgpt","claude","copilot"].forEach(id => {
    const body = document.getElementById("ai-body-"+id);
    const btn  = document.getElementById("ai-btn-"+id);
    if (!body || !btn) return;
    const open = aiOpen === id;
    body.style.display = open ? "block" : "none";
    btn.className = "edit-toggle" + (open ? " open" : "");
  });
}

// ── Prompt live-update from edit textareas ───────────────────
function editTxt(qId, val){
  ans[qId] = val;
  const pbox = document.getElementById("pbox");
  if (pbox) pbox.textContent = generatePrompt(ans);
}

// ── Render ──────────────────────────────────────────────────
function render(){
  const isIntro = step === -1;
  const isDone  = step >= N;
  const page    = (!isIntro && !isDone) ? PAGES[step] : null;
  const pct     = isDone ? 100 : isIntro ? 0 : ((step + 1) / N) * 100;

  progressTrack.style.display = isIntro ? "none" : "block";
  if (!isIntro) progressFill.style.width = pct + "%";

  // update theme btn text since html might have re-rendered
  updateThemeBtn(document.documentElement.dataset.theme);

  let html = "";

  // ── Intro ──
  if (isIntro) {
    html = `
    <div class="fade" style="padding-top:72px">
      <div class="badge">AI-personalisering</div>
      <h1>Bygg din<br><span style="color:var(--acc)">AI-profil.</span></h1>
      <p style="color:var(--muted);font-size:16px;line-height:1.7;margin:0 0 40px;max-width:450px">
        ${N} steg. En prompt du kan klistra in i vilken AI-chatt som helst — Claude, ChatGPT, Gemini — så att den vet vem du är, hur du tänker och exakt vad du behöver.
      </p>
      <div class="stats">
        <div class="stat" style="border-right:1px solid var(--bord)"><div class="stat-val">${N}</div><div class="stat-label">steg</div></div>
        <div class="stat" style="border-right:1px solid var(--bord)"><div class="stat-val">~4 min</div><div class="stat-label">att slutföra</div></div>
        <div class="stat"><div class="stat-val">1 prompt</div><div class="stat-label">funkar var som helst</div></div>
      </div>
      <button class="next" style="width:100%;padding:16px;font-size:16px" onclick="next()">Börja bygga min profil →</button>
      <div class="privacy-note" style="margin-top:24px">
        🔒 <strong>Dina svar sparas aldrig och skickas aldrig.</strong> Hela quizet körs lokalt i din webbläsare utan externa anrop. Svar försvinner om du laddar om sidan. Det enda som lämnar din enhet är prompten — och bara när du själv väljer att kopiera den. (Ditt val av mörkt/ljust tema sparas lokalt i webbläsaren.)
      </div>
    </div>`;

  // ── Question page ──
  } else if (page) {
    const catColor = CAT_CLR[page.category] || "#E8590C";
    const isPageOptional = page.qs.every(q => q.optional);
    const disabled = !canNext(page) ? " disabled" : "";

    html = `<div class="fade" style="padding-top:52px">
      <div class="qhead">
        <span class="cat-pill" style="background:${catColor}18;border-color:${catColor}30;color:${catColor}">${esc(page.category)}</span>
        <span class="counter">${step + 1} / ${N}</span>
      </div>
      <h2 class="qtitle">${esc(page.title)}</h2>
      <p class="qsub">${esc(page.subtitle || "")}</p>`;

    for (const q of page.qs) {
      if (q.label) html += `<p class="qlabel">${esc(q.label)}</p>`;

      if (q.type === "text") {
        html += `<textarea id="ta-${q.id}" rows="3" placeholder="${escAttr(q.placeholder||"")}" oninput="handleTxtInput(this,'${q.id}')">${esc(ans[q.id]||"")}</textarea>`;
        if (q.hint) html += `<p class="hint">${esc(q.hint)}</p>`;
      }

      if (q.type === "single") {
        html += `<div data-qid="${q.id}">`;
        q.options.forEach(opt => {
          const on = ans[q.id] === opt ? " on" : "";
          html += `<button class="opt${on}" onclick="pickSingle(this,'${q.id}',${escAttr(JSON.stringify(opt))})">${esc(opt)}</button>`;
        });
        html += `</div>`;
        if (q.hasAnnat) {
          const showAnnat = ans[q.id] === "Annat";
          html += `<div class="annat-wrap${showAnnat?" show":""}" id="annat-wrap">
            <input type="text" class="other-input" placeholder="Beskriv ditt område med egna ord" value="${escAttr(ans["industry_annat"]||"")}" oninput="handleAnnatInput(this)">
          </div>`;
        }
      }

      if (q.type === "multi") {
        const sel = ans[q.id] || [];
        html += `<div data-qid="${q.id}">`;
        q.options.forEach(opt => {
          const on = sel.includes(opt) ? " on" : "";
          html += `<button class="tag${on}" onclick="toggleMulti(this,'${q.id}',${escAttr(JSON.stringify(opt))},${q.maxSelect||0})">${esc(opt)}</button>`;
        });
        html += `</div>`;
        if (q.maxSelect) {
          html += `<p class="max-note" id="max-note-${q.id}">${sel.length} / ${q.maxSelect} valda</p>`;
        }
        if (q.allowOther) {
          html += `<input type="text" class="other-input" id="other-${q.id}" placeholder="Passar inget? Skriv eget — separera flera med komma" value="${escAttr(ans[q.id+'_other']||'')}" oninput="handleOtherInput(this,'${q.id}')">`;
        }
      }
    }

    const isLast = step === N - 1;
    html += `<div class="navrow">
      <button class="back" onclick="back()">← Tillbaka</button>
      <button class="next" id="next-btn"${disabled} onclick="handleNext()">${isLast ? "Skapa min prompt →" : "Nästa →"}</button>
    </div>`;

    if (isPageOptional) {
      html += `<button class="skip" onclick="next()">Hoppa över</button>`;
    }

    html += `</div>`;

  // ── Done screen ──
  } else if (isDone) {
    const promptText = generatePrompt(ans);

    // Build edit rows
    let editRowsHtml = "";
    PAGES.forEach((p, i) => {
      p.qs.forEach(q => {
        let valStr = "";
        if (q.type === "text") {
          const v = ans[q.id] || "";
          valStr = v
            ? `<textarea class="edit-ta" oninput="editTxt('${q.id}',this.value)">${esc(v)}</textarea>`
            : `<span style="color:var(--muted);font-size:13px">Inte besvarad</span>`;
        } else if (q.type === "single") {
          let v = ans[q.id] || "";
          if (q.id === "industry" && v === "Annat" && ans.industry_annat) v = "Annat: " + ans.industry_annat;
          valStr = v
            ? `<span>${esc(v)}</span>`
            : `<span style="color:var(--muted);font-size:13px">Inte besvarad</span>`;
        } else if (q.type === "multi") {
          const vals = (ans[q.id]||[]).slice();
          const other = (ans[q.id+"_other"]||"").trim();
          if (other) other.split(",").map(s=>s.trim()).filter(Boolean).forEach(v=>{if(!vals.includes(v))vals.push(v);});
          valStr = vals.length
            ? `<span>${esc(vals.join(", "))}</span>`
            : `<span style="color:var(--muted);font-size:13px">Inget valt</span>`;
        }
        const qLabel = q.label || p.title;
        editRowsHtml += `
          <div class="edit-row">
            <div class="edit-row-head">
              <div style="flex:1">
                <div class="edit-row-q">${esc(qLabel)}</div>
                <div class="edit-row-val">${valStr}</div>
              </div>
              <button class="edit-btn" onclick="goToStep(${i})">Ändra</button>
            </div>
          </div>`;
      });
    });

    const aiGuide = [
      {
        id: "chatgpt",
        label: "ChatGPT",
        steps: [
          { n:1, title:"Kopiera prompt", body:'Klicka på <strong>Kopiera prompt</strong>-knappen ovan.' },
          { n:2, title:"Öppna ChatGPT", body:'Gå till chatgpt.com och starta en ny chatt.' },
          { n:3, title:"Klistra in och skicka", body:'Klistra in prompten som ditt <strong>allra första meddelande</strong> i chatten och skicka — ChatGPT anpassar sig direkt.' },
          { n:4, title:"Spara för alla chattar (valfritt)", body:'Klicka på ditt namn (nere till vänster) → <strong>Anpassa ChatGPT</strong> (Customize ChatGPT) → klistra in under <em>"What would you like ChatGPT to know about you?"</em> → Spara. Gäller sedan automatiskt i varje ny chatt.' }
        ]
      },
      {
        id: "claude",
        label: "Claude",
        steps: [
          { n:1, title:"Kopiera prompt", body:'Klicka på <strong>Kopiera prompt</strong>-knappen ovan.' },
          { n:2, title:"Öppna Claude", body:'Gå till claude.ai och starta en ny chatt.' },
          { n:3, title:"Klistra in som första meddelande", body:'Klistra in prompten som ditt <strong>allra första meddelande</strong> — Claude anpassar sig direkt.' },
          { n:4, title:"Spara permanent (valfritt)", body:'Klicka på ditt namn → <strong>Inställningar</strong> (Settings) → <strong>Användarpreferenser</strong> (User preferences) → klistra in under <em>"What personal preferences would you like Claude to consider?"</em> → Spara. Gäller sedan automatiskt i varje ny chatt.' }
        ]
      },
      {
        id: "copilot",
        label: "Copilot",
        steps: [
          { n:1, title:"Kopiera prompt", body:'Klicka på <strong>Kopiera prompt</strong>-knappen ovan.' },
          { n:2, title:"Öppna Copilot", body:'Gå till copilot.microsoft.com eller öppna Copilot-appen.' },
          { n:3, title:"Öppna inställningar", body:'Klicka på <strong>...</strong> (menyn uppe till höger) → <strong>Inställningar</strong> (Settings) → <strong>Anpassning</strong> (Personalisation).' },
          { n:4, title:"Lägg till instruktioner", body:'Klicka på <strong>Anpassade instruktioner</strong> (Custom instructions) → <strong>Redigera</strong> (Edit) → klistra in prompten → Spara. Copilot följer nu dina preferenser automatiskt.' }
        ]
      }
    ];

    const aiAccordionHtml = aiGuide.map(ai => {
      const stepsHtml = ai.steps.map(s =>
        `<div class="ai-step">
          <div class="ai-step-n">${s.n}</div>
          <div class="ai-step-body"><strong>${s.title}</strong><br>${s.body}</div>
        </div>`
      ).join("");
      const isOpen = aiOpen === ai.id;
      return `
        <div style="margin-top:8px">
          <button class="edit-toggle${isOpen?" open":""}" id="ai-btn-${ai.id}" onclick="toggleAI('${ai.id}')">
            <span>${ai.label}</span>
            <span class="arrow">▾</span>
          </button>
          <div id="ai-body-${ai.id}" style="display:${isOpen?"block":"none"};padding:10px 4px 4px">
            ${stepsHtml}
          </div>
        </div>`;
    }).join("");

    html = `
    <div class="fade" style="padding-top:52px">
      <div class="badge" style="display:inline-flex;align-items:center;gap:6px">✓ Profil klar</div>
      <h2 style="font-size:clamp(22px,4vw,30px);font-weight:800;margin-bottom:10px;letter-spacing:-.02em">
        Din personaliseringsprompt är klar.
      </h2>

      <div class="pbox" id="pbox">${esc(promptText)}</div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="cpbtn${copied?" ok":""}" id="cp-btn" onclick="copyPrompt()">${copied?"✓ Kopierad!":"Kopiera prompt"}</button>
        <button class="back" style="font-size:13px;padding:11px 16px" onclick="startOver()">Börja om</button>
      </div>

      <div class="edit-section">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding:0 2px">Så klistrar du in den</div>
        ${aiAccordionHtml}
      </div>

      <div class="edit-section">
        <button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">
          <span>Granska &amp; redigera svar</span>
          <span class="arrow">▾</span>
        </button>
        <div class="edit-rows${editOpen?" open":""}" id="edit-rows">
          ${editRowsHtml}
        </div>
      </div>

      <div class="share-box">
        <strong>💡 Dela quizet, inte prompten.</strong> Din prompt är specifik för <em>dig</em>. Om kollegor eller vänner också vill ha personalisering, skicka quizet till dem — alla svar blir deras egen unika prompt.
      </div>
      <div class="privacy-note" style="margin-top:16px">
        🔒 Prompten skapades helt i din webbläsare utan externa anrop. Inga svar har sparats eller skickats någonstans. (Ditt temaval sparas lokalt i webbläsaren.)
      </div>
    </div>`;
  }

  app.innerHTML = html;
  updateThemeBtn(document.documentElement.dataset.theme);

  // Focus first textarea on text pages
  if (page) {
    const firstTa = app.querySelector("textarea");
    if (firstTa && page.qs[0]?.type === "text") firstTa.focus();
  }
}

render();
</script>
